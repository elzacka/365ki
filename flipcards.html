<style>
  .m365-grid {
    --m365-bg-front: #ffffff;
    --m365-bg-back: #1a3a5c;
    --m365-text-front: #1f2937;
    --m365-text-tagline: #4b5563;
    --m365-text-back: #ffffff;
    --m365-text-back-muted: #cfe0f5;
    --m365-border: #e5e7eb;
    --m365-shadow: 0 4px 14px rgba(0,0,0,0.08);
    --m365-shadow-hover: 0 10px 24px rgba(0,0,0,0.14);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
    padding: 8px 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    box-sizing: border-box;
  }
  .m365-grid *, .m365-grid *::before, .m365-grid *::after { box-sizing: border-box; }
  .m365-card { perspective: 1200px; aspect-ratio: 1 / 1.15; cursor: pointer; outline: none; }
  .m365-card:focus-visible .m365-card-inner { box-shadow: 0 0 0 3px #2563eb; }
  .m365-card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.6s cubic-bezier(.2,.8,.2,1);
    transform-style: preserve-3d; border-radius: 14px; box-shadow: var(--m365-shadow);
  }
  .m365-card:hover .m365-card-inner { box-shadow: var(--m365-shadow-hover); }
  .m365-card.is-flipped .m365-card-inner { transform: rotateY(180deg); }
  .m365-face {
    position: absolute; inset: 0; width: 100%; height: 100%;
    -webkit-backface-visibility: hidden; backface-visibility: hidden;
    border-radius: 14px; overflow: hidden;
  }
  .m365-front {
    background: var(--m365-bg-front); color: var(--m365-text-front);
    border: 1px solid var(--m365-border); padding: 18px 16px 26px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .m365-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 12px; flex-shrink: 0; }
  .m365-name { margin: 0 0 6px 0; font-size: 1.05rem; font-weight: 600; line-height: 1.2; color: var(--m365-text-front); }
  .m365-tagline { margin: 0; font-size: 0.85rem; line-height: 1.35; color: var(--m365-text-tagline); }
  .m365-back {
    background: var(--m365-bg-back); color: var(--m365-text-back); transform: rotateY(180deg);
    padding: 16px 16px 26px; display: flex; flex-direction: column; text-align: left;
  }
  .m365-back-content { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .m365-text { margin: 0; font-size: 0.85rem; line-height: 1.45; color: var(--m365-text-back); text-align: left; }
  .m365-footnote {
    margin: 8px 0 0 0; padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.18);
    font-size: 0.65rem; line-height: 1.35; color: var(--m365-text-back-muted);
    opacity: 0.85; font-style: italic; text-align: left;
  }
  .m365-flip-hint {
    position: absolute; right: 10px; bottom: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #9ca3af; opacity: 0.55;
    transition: opacity 0.2s ease, color 0.2s ease; pointer-events: none;
  }
  .m365-flip-hint--back { color: #cfe0f5; opacity: 0.55; }
  .m365-card:hover .m365-flip-hint { opacity: 0.9; }
  .m365-card:focus-visible .m365-flip-hint { opacity: 0.95; }
  @media (max-width: 480px) {
    .m365-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .m365-front, .m365-back { padding: 14px 12px 22px; }
    .m365-logo { width: 52px; height: 52px; margin-bottom: 8px; }
    .m365-name { font-size: 0.95rem; }
    .m365-tagline { font-size: 0.78rem; }
    .m365-text { font-size: 0.78rem; line-height: 1.4; }
    .m365-back-content { gap: 8px; }
    .m365-footnote { font-size: 0.6rem; margin-top: 6px; padding-top: 5px; }
    .m365-flip-hint { right: 8px; bottom: 6px; }
    .m365-flip-hint svg { width: 14px; height: 14px; }
  }
  @media (prefers-reduced-motion: reduce) { .m365-card-inner { transition: none; } }
</style>

<!-- Renderer — bygger kortene fra M365_CARDS og M365_LOGOS -->
<script>
(function () {
  const FLIP_ICON = '<svg class="m365-flip-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">'
    + '<path fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" d="M4 9a8 8 0 0 1 14-3l2 2M20 15a8 8 0 0 1-14 3l-2-2"/>'
    + '<path fill="currentColor" d="M20 4v5h-5z"/>'
    + '<path fill="currentColor" d="M4 20v-5h5z"/>'
    + '</svg>';

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderCard(c) {
    const logo = (typeof M365_LOGOS !== 'undefined' && M365_LOGOS[c.navn]) ? M365_LOGOS[c.navn] : '';
    const fotnote = c.fotnote ? ('<p class="m365-footnote">' + escapeHtml(c.fotnote) + '</p>') : '';
    return '<div class="m365-card" tabindex="0" role="button" aria-label="' + escapeHtml(c.navn) + ' — trykk for å snu kortet">'
      +   '<div class="m365-card-inner">'
      +     '<div class="m365-face m365-front">'
      +       '<img class="m365-logo" src="data:image/png;base64,' + logo + '" alt="' + escapeHtml(c.navn) + '-logo" loading="lazy" />'
      +       '<h3 class="m365-name">' + escapeHtml(c.navn) + '</h3>'
      +       '<p class="m365-tagline">' + escapeHtml(c.tagline) + '</p>'
      +       '<span class="m365-flip-hint" aria-hidden="true">' + FLIP_ICON + '</span>'
      +     '</div>'
      +     '<div class="m365-face m365-back">'
      +       '<div class="m365-back-content">'
      +         '<p class="m365-text">' + escapeHtml(c.alene) + '</p>'
      +         '<p class="m365-text">' + escapeHtml(c.sammen) + '</p>'
      +       '</div>'
      +       fotnote
      +       '<span class="m365-flip-hint m365-flip-hint--back" aria-hidden="true">' + FLIP_ICON + '</span>'
      +     '</div>'
      +   '</div>'
      + '</div>';
  }

  const grid = document.getElementById('m365-grid');
  if (!grid) return;
  grid.innerHTML = M365_CARDS.map(renderCard).join('');

  function toggle(card) { card.classList.toggle('is-flipped'); }
  grid.addEventListener('click', function (e) {
    const card = e.target.closest('.m365-card');
    if (card) toggle(card);
  });
  grid.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('.m365-card');
    if (card) { e.preventDefault(); toggle(card); }
  });
})();
</script>
